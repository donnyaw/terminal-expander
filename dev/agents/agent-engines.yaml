# Engine assignments per agent
engines:
  agent-orchestrator:
    provider: opencode-go
    model: deepseek-v4-pro
    source: subscription
    reason: Needs good reasoning to classify intent and route tasks. Flash is too weak, GPT-5.5 is overkill for routing.

  agent-planner:
    provider: openai
    model: gpt-5.5
    source: subscription
    reason: Architecture decisions, crate decomposition, trait design. One bad design decision costs days.

  agent-form-tui:
    provider: opencode-go
    model: deepseek-v4-flash
    source: token
    reason: Fast iterations on Cursive/Ratatui form rendering. 1M context fits entire codebase.

  agent-rust-core:
    provider: opencode-go
    model: deepseek-v4-flash
    source: token
    reason: Match engine, YAML config, render pipeline — lots of iterating. Flash is fast and cheap.

  agent-platform:
    provider: opencode-go
    model: deepseek-v4-flash
    source: token
    reason: evdev/uinput boilerplate. Flash has 1M context for system headers and kernel docs.

  agent-shell:
    provider: opencode-go
    model: deepseek-v4-flash
    source: token
    reason: zle hooks, bash bindings — small files, fast work. No need for expensive models.

  agent-test-build:
    provider: opencode-go
    model: deepseek-v4-flash
    source: token
    reason: Writing tests and CI config. Cheap, fast, good enough.

  agent-librarian:
    provider: opencode-go
    model: deepseek-v4-flash
    source: token
    reason: Reads/writes markdown — lightweight. No reasoning needed beyond tag matching.

  agent-qc:
    provider: openai
    model: gpt-5.5
    source: subscription
    reason: Quality gate — catch bugs, review design, score outputs. Final validation.

  agent-docs:
    provider: opencode-go
    model: deepseek-v4-flash
    source: token
    reason: Documentation writing. Flash is sufficient for clear prose.
