# QC Agent Configuration

scoring:
  scale: 0-100
  threshold: 75
  target_score: 90
  criteria_weights:
    functionality: 30
    code_quality: 20
    security: 15
    performance: 15
    compatibility: 10
    documentation: 5
    test_coverage: 5

test_coverage:
  minimum_percentage: 70
  exclude_patterns:
    - "vendor/"
    - "target/"
    - "dist/"

test_commands:
  rust:
    - "cargo build"
    - "cargo test"
    - "cargo clippy -- -D warnings"
    - "cargo fmt --check"

reporting:
  generate_detailed_report: true
  report_format: markdown
  report_location: "qc-reports/"
  csv_update: true

auto_return:
  enabled: true
  max_retries: 2
  feedback_included: true

environment:
  isolated_worktree_recommended: true
  destructive_commands_require_approval: true
  secrets_policy: "Document variable names only. Never expose raw secret values."
